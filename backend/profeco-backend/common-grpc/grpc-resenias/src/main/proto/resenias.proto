syntax = "proto3";

import "google/api/annotations.proto";

option java_multiple_files = true;
option java_package = "com.mycompany.grpc.resenias";
option java_outer_classname = "ReseniasProto";

package profeco.resenias.v1;

service ReseniasService {
  rpc Ping(Empty) returns (PingResponse) {
    option (google.api.http) = {
      get: "/api/resenias/ping"
      additional_bindings {
        post: "/profeco.resenias.v1.ReseniasService/Ping"
        body: "*"
      }
    };
  }
}

message Empty {}

message PingResponse {
  string mensaje = 1;
}