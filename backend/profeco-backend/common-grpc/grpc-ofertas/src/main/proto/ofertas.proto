syntax = "proto3";

import "google/api/annotations.proto";

option java_multiple_files = true;
option java_package = "com.mycompany.grpc.ofertas";
option java_outer_classname = "OfertasProto";

package profeco.ofertas.v1;

service OfertasService {
  rpc Ping(Empty) returns (PingResponse) {
    option (google.api.http) = {
      get: "/api/ofertas/ping"
      additional_bindings {
        post: "/profeco.ofertas.v1.OfertasService/Ping"
        body: "*"
      }
    };
  }

  rpc PublicarOferta(PublicarOfertaRequest) returns (PublicarOfertaResponse) {
    option (google.api.http) = {
      post: "/api/ofertas/publicar"
      body: "*"
    };
  }
}

message Empty {}

message PingResponse {
  string mensaje = 1;
}

message PublicarOfertaRequest {
  string titulo = 1;
  string descripcion = 2;
  double precio_original = 3;
  double precio_oferta = 4;
  double porcentaje_descuento = 5;
}

message PublicarOfertaResponse {
  string mensaje = 1;
}