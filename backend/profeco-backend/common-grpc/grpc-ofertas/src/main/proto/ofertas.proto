syntax = "proto3";

import "google/api/annotations.proto";

option java_multiple_files = true;
option java_package = "com.mycompany.grpc.ofertas";
option java_outer_classname = "OfertasProto";

package profeco.ofertas.v1;

service OfertasService {
  rpc Ping(Empty) returns (PingResponse) {
    option (google.api.http) = {
      get: "/api/ofertas/ping"
      additional_bindings {
        post: "/profeco.ofertas.v1.OfertasService/Ping"
        body: "*"
      }
    };
  }
}

message Empty {}

message PingResponse {
  string mensaje = 1;
}