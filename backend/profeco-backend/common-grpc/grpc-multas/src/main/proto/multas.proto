syntax = "proto3";

import "google/api/annotations.proto";

option java_multiple_files = true;
option java_package = "com.mycompany.grpc.multas";
option java_outer_classname = "MultasProto";

package profeco.multas.v1;

service MultasService {
  // Solo nos importa que este cable funcione para el avance
  rpc Ping(Empty) returns (PingResponse) {
    option (google.api.http) = {
      get: "/api/multas/ping"
      additional_bindings {
        post: "/profeco.multas.v1.MultasService/Ping"
        body: "*"
      }
    };
  }
}

message Empty {}

message PingResponse {
  string mensaje = 1;
}