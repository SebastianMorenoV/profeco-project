syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.mycompany.grpc.comercio";
option java_outer_classname = "ComercioProto";

package ecommerce.comercio.v1;

service ComercioService {
  rpc Ping(Empty) returns (PingResponse);
}

message Empty {}

message PingResponse {
  string mensaje = 1;
}