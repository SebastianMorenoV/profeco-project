syntax = "proto3";

import "google/api/annotations.proto";

option java_multiple_files = true;
option java_package = "com.mycompany.grpc.comercio";
option java_outer_classname = "ComercioProto";

package profeco.comercio.v1;

service ComercioService {
  rpc Ping(Empty) returns (PingResponse) {
    option (google.api.http) = {
      get: "/api/comercio/ping"
      additional_bindings {
        post: "/profeco.comercio.v1.ComercioService/Ping"
        body: "*"
      }
    };
  }
}

message Empty {}

message PingResponse {
  string mensaje = 1;
}