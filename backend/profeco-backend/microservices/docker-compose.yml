# ==========================================
# DOCKER COMPOSE: MICROSERVICIOS PROFECO
# ==========================================
# Levanta los 6 microservicios Spring Boot en contenedores.
# MySQL y RabbitMQ deben estar corriendo en el host.
#
# Uso:
#   docker compose up -d --build
#   docker compose logs -f ms-catalogo
#   docker compose down
# ==========================================

services:

  ms-catalogo:
    build:
      context: ./ms-catalogo
      dockerfile: Dockerfile
    container_name: ms-catalogo
    ports:
      - "8091:8091"
      - "9091:9091"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/catalogo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=itson
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    restart: unless-stopped
    networks:
      - profeco-net

  ms-comercio:
