services:
  gateway-comercio:
    image: envoyproxy/envoy:v1.31-latest
    container_name: gateway-comercio
    ports:
      - "8082:8082"
    volumes:
      - ./envoy-comercio.yaml:/etc/envoy/envoy.yaml:ro
      - ./proto:/etc/envoy/proto:ro
    command: ["-c", "/etc/envoy/envoy.yaml", "--service-cluster", "gateway-comercio"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - profeco-net

  gateway-consumidor:
    image: envoyproxy/envoy:v1.31-latest
    container_name: gateway-consumidor
    ports:
      - "8083:8083"
    volumes:
      - ./envoy-consumidor.yaml:/etc/envoy/envoy.yaml:ro
      - ./proto:/etc/envoy/proto:ro
    command: ["-c", "/etc/envoy/envoy.yaml", "--service-cluster", "gateway-consumidor"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - profeco-net

  gateway-consumidor-movil:
    image: envoyproxy/envoy:v1.31-latest
    container_name: gateway-consumidor-movil
    ports:
      - "8084:8084"
    volumes:
      - ./envoy-consumidor-movil.yaml:/etc/envoy/envoy.yaml:ro
      - ./proto:/etc/envoy/proto:ro
    command: ["-c", "/etc/envoy/envoy.yaml", "--service-cluster", "gateway-consumidor-movil"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - profeco-net

  gateway-profeco:
    image: envoyproxy/envoy:v1.31-latest
    container_name: gateway-profeco
    ports:
      - "8085:8085"
    volumes:
      - ./envoy-profeco.yaml:/etc/envoy/envoy.yaml:ro
      - ./proto:/etc/envoy/proto:ro
    command: ["-c", "/etc/envoy/envoy.yaml", "--service-cluster", "gateway-profeco"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - profeco-net

networks:
  profeco-net:
    external: true

