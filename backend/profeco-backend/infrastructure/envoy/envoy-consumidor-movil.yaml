static_resources:
  listeners:
    - name: listener_consumidor_movil
      address:
        socket_address: { address: 0.0.0.0, port_value: 8084 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                route_config:
                  name: local_routes
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      cors:
                        allow_origin_string_match: [{ prefix: "http://localhost" }]
                        allow_methods: "GET, POST, PUT, DELETE, OPTIONS"
                        allow_headers: "Content-Type, Authorization"
                      routes:
                        - match: { prefix: "/profeco.catalogo.v1.CatalogoService/" }
                          route: { cluster: ms-catalogo }
                        - match: { prefix: "/profeco.resenias.v1.ReseniasService/" }
                          route: { cluster: ms-resenias }
                        - match: { prefix: "/profeco.multas.v1.MultasService/" }
                          route: { cluster: ms-multas }
                        - match: { prefix: "/profeco.usuarios.v1.UsuariosService/" }
                          route: { cluster: ms-usuarios }
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config: { "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors }
                  - name: envoy.filters.http.grpc_json_transcoder
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoder
                      proto_descriptor: "/etc/envoy/proto/gateway-consumidor.pb"
                      services:
                        - "profeco.catalogo.v1.CatalogoService"
                        - "profeco.resenias.v1.ReseniasService"
                        - "profeco.multas.v1.MultasService"
                        - "profeco.usuarios.v1.UsuariosService"
                      print_options: { add_whitespace: true }
                      auto_mapping: true
                  - name: envoy.filters.http.router
                    typed_config: { "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router }

  clusters:
    - name: ms-catalogo
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      typed_extension_protocol_options: { envoy.extensions.upstreams.http.v3.HttpProtocolOptions: { "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions, explicit_http_config: { http2_protocol_options: {} } } }
      load_assignment: { cluster_name: ms-catalogo, endpoints: [{ lb_endpoints: [{ endpoint: { address: { socket_address: { address: host.docker.internal, port_value: 9091 } } } }] }] }
    - name: ms-resenias
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      typed_extension_protocol_options: { envoy.extensions.upstreams.http.v3.HttpProtocolOptions: { "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions, explicit_http_config: { http2_protocol_options: {} } } }
      load_assignment: { cluster_name: ms-resenias, endpoints: [{ lb_endpoints: [{ endpoint: { address: { socket_address: { address: host.docker.internal, port_value: 9094 } } } }] }] }
    - name: ms-multas
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      typed_extension_protocol_options: { envoy.extensions.upstreams.http.v3.HttpProtocolOptions: { "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions, explicit_http_config: { http2_protocol_options: {} } } }
      load_assignment: { cluster_name: ms-multas, endpoints: [{ lb_endpoints: [{ endpoint: { address: { socket_address: { address: host.docker.internal, port_value: 9097 } } } }] }] }
    - name: ms-usuarios
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      typed_extension_protocol_options: { envoy.extensions.upstreams.http.v3.HttpProtocolOptions: { "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions, explicit_http_config: { http2_protocol_options: {} } } }
      load_assignment: { cluster_name: ms-usuarios, endpoints: [{ lb_endpoints: [{ endpoint: { address: { socket_address: { address: host.docker.internal, port_value: 9096 } } } }] }] }
